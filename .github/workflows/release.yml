name: release

# Auto-create a GitHub Release whenever a version tag is pushed, using the
# matching section of CHANGELOG.md as the notes. (Packagist syncs from the tag
# independently via its webhook — this is just the human-facing Release.)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract the CHANGELOG section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See the [CHANGELOG](CHANGELOG.md)." > RELEASE_NOTES.md
          fi

      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          make_latest: true
