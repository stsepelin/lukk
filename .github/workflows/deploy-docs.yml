name: Deploy Docs

# Build the UNIFIED docs (from the stsepelin/lukk-docs repo, which documents both this
# package and the lukk-js client) and publish them to this repo's GitHub Pages at
# https://stsepelin.github.io/lukk. Requires: Settings → Pages → Source = "GitHub Actions".
#
# Triggered manually, when this workflow changes, or by a `docs-updated` repository
# dispatch that lukk-docs sends on every push to its main (see lukk-docs .github/ci.yml).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-docs.yml'
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the unified docs source
        uses: actions/checkout@v4
        with:
          repository: stsepelin/lukk-docs
          fetch-depth: 0 # lastUpdated needs full history
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
